name: HIPAA IaC Pipeline
on:
  push:
    branches: [main]
    paths: ['iac/**']
permissions:
  id-token: write
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Bicep
        run: az bicep build --file iac/main.bicep

  validate:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: What-If Preview
        run: |
          az deployment group what-if \
            --resource-group rg-hipaa-apps \
            --template-file iac/main.bicep \
            --parameters @iac/parameters.lab.json

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group rg-hipaa-apps \
            --template-file iac/main.bicep \
            --parameters @iac/parameters.lab.json \
            --mode Incremental

  smoke-test:
    needs: deploy
    if: ${{ vars.FHIR_ENDPOINT != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Get FHIR token
        id: token
        run: |
          TOKEN=$(az account get-access-token \
            --resource ${{ vars.FHIR_ENDPOINT }} \
            --query accessToken -o tsv)
          echo "::add-mask::$TOKEN"
          echo "fhir_token=$TOKEN" >> $GITHUB_OUTPUT
      - name: FHIR metadata smoke test
        run: |
          curl -sf \
            -H "Authorization: Bearer ${{ steps.token.outputs.fhir_token }}" \
            ${{ vars.FHIR_ENDPOINT }}/metadata | \
            jq '.fhirVersion' | grep -q '4.0.1'

  fhir-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache HL7 Validator
        uses: actions/cache@v4
        with:
          path: validator_cli.jar
          key: hl7-validator-latest
      - name: Download HL7 Validator CLI
        run: |
          if [ ! -f validator_cli.jar ]; then
            curl -L https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar \
              -o validator_cli.jar
          fi
      - name: Validate FHIR samples
        run: |
          java -jar validator_cli.jar fhir-samples/patient.json -version 4.0.1
          java -jar validator_cli.jar fhir-samples/observation.json -version 4.0.1
          java -jar validator_cli.jar fhir-samples/diagnosticreport.json -version 4.0.1
